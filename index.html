<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8x8 Procedural Top-Down Game</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
        }
        canvas {
            background: #222;
            /* CRITICAL FOR PIXEL ART: Prevents the browser from blurring your 8x8 assets */
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-crisp-edges;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Set canvas display size
canvas.width = 800;
canvas.height = 600;

// Force the context to keep pixels sharp when scaling
ctx.imageSmoothingEnabled = false;

// --- CONFIGURATION ---
const TILE_SIZE = 8;      // Your native asset size
const SCALE = 6;          // Scale factor (8x8 pixels scaled by 6 = 48x48 blocks on screen)
const BLOCK_SIZE = TILE_SIZE * SCALE;

// --- ASSET LOADER ---
const assets = {
    Grass: new Image(),
    Dirt: new Image()
};

assets.Grass.src = 'Grass.png'; 
assets.Dirt.src = 'Dirt.png';

// Fallback colors if images fail to load or aren't in the directory yet
const fallbacks = {
    Grass: '#557a2b',
    Dirt: '#6e473b'
};

// --- PLAYER SYSTEM (Great Movement Mechanics) ---
const player = {
    x: 0, // World X positions
    y: 0, // World Y positions
    vx: 0, // Velocity X
    vy: 0, // Velocity Y
    speed: 0.8, // Acceleration rate
    friction: 0.82, // Slide factor (lower = tighter stops, higher = slipperier)
    size: 6 * SCALE // Player size scaled
};

// Track keyboard inputs
const keys = {};
window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

// --- CAMERA SYSTEM ---
const camera = {
    x: 0,
    y: 0,
    lerpFactor: 0.1 // Smooth tracking speed (lower = lazier camera, 1 = locked)
};

// --- PROCEDURAL GENERATION SYSTEM ---
// Infinite dynamic chunk storage
const worldChunks = {};
const CHUNK_SIZE = 16; // 16x16 tiles per chunk

// A lightweight, deterministic 2D pseudo-random noise generator for cool terrain patches
function MathNoise2D(x, y) {
    // Combine multiple sine wave frequencies to simulate organic biomes (fBm approach)
    let v1 = Math.sin(x * 0.07) * Math.cos(y * 0.07);
    let v2 = Math.sin(x * 0.02 + 5) * Math.sin(y * 0.02 + 2) * 1.2;
    let v3 = Math.cos(x * 0.2) * Math.sin(y * 0.2) * 0.3;
    return (v1 + v2 + v3) / 2.5; 
}

function generateChunk(chunkX, chunkY) {
    const chunkKey = `${chunkX},${chunkY}`;
    if (worldChunks[chunkKey]) return worldChunks[chunkKey];

    const tiles = [];
    for (let y = 0; y < CHUNK_SIZE; y++) {
        tiles[y] = [];
        for (let x = 0; x < CHUNK_SIZE; x++) {
            // Absolute global tile coordinates
            const globalX = chunkX * CHUNK_SIZE + x;
            const globalY = chunkY * CHUNK_SIZE + y;

            // Sample our noise algorithm
            const noiseValue = MathNoise2D(globalX, globalY);

            // Determine tile based on noise thresholds
            let tileType = 'Grass';
            if (noiseValue < -0.1) {
                tileType = 'Dirt';
            }

            tiles[y][x] = tileType;
        }
    }

    worldChunks[chunkKey] = tiles;
    return tiles;
}

// --- ENGINE LOOPS ---

function update() {
    // 1. Handle Movement Input
    let ax = 0;
    let ay = 0;

    if (keys['w'] || keys['arrowup']) ay -= 1;
    if (keys['s'] || keys['arrowdown']) ay += 1;
    if (keys['a'] || keys['arrowleft']) ax -= 1;
    if (keys['d'] || keys['arrowright']) ax += 1;

    // Normalize diagonal movement vector so diagonal running isn't faster
    if (ax !== 0 && ay !== 0) {
        ax *= 0.7071;
        ay *= 0.7071;
    }

    // Apply acceleration to velocity
    player.vx += ax * player.speed;
    player.vy += ay * player.speed;

    // Apply friction/drag physics
    player.vx *= player.friction;
    player.vy *= player.friction;

    // Update position
    player.x += player.vx;
    player.y += player.vy;

    // 2. Smooth Camera Tracking (Lerping)
    const targetCamX = player.x - canvas.width / 2 + player.size / 2;
    const targetCamY = player.y - canvas.height / 2 + player.size / 2;
    
    camera.x += (targetCamX - camera.x) * camera.lerpFactor;
    camera.y += (targetCamY - camera.y) * camera.lerpFactor;
}

function draw() {
    // Clear screen
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Re-verify image smoothing state before draw calls
    ctx.imageSmoothingEnabled = false;

    // Calculate visible chunk bounds relative to camera view window
    const startChunkX = Math.floor(camera.x / (CHUNK_SIZE * BLOCK_SIZE));
    const endChunkX = Math.floor((camera.x + canvas.width) / (CHUNK_SIZE * BLOCK_SIZE));
    const startChunkY = Math.floor(camera.y / (CHUNK_SIZE * BLOCK_SIZE));
    const endChunkY = Math.floor((camera.y + canvas.height) / (CHUNK_SIZE * BLOCK_SIZE));

    // Render all visible chunks
    for (let cx = startChunkX; cx <= endChunkX; cx++) {
        for (let cy = startChunkY; cy <= endChunkY; cy++) {
            const chunk = generateChunk(cx, cy);

            for (let y = 0; y < CHUNK_SIZE; y++) {
                for (let x = 0; x < CHUNK_SIZE; x++) {
                    const tileType = chunk[y][x];
                    
                    // Compute on-screen draw coordinates
                    const worldX = (cx * CHUNK_SIZE + x) * BLOCK_SIZE;
                    const worldY = (cy * CHUNK_SIZE + y) * BLOCK_SIZE;
                    const screenX = Math.floor(worldX - camera.x);
                    const screenY = Math.floor(worldY - camera.y);

                    const img = assets[tileType];
                    // If image is ready and fully loaded, draw pixel art asset
                    if (img.complete && img.naturalWidth !== 0) {
                        ctx.drawImage(img, screenX, screenY, BLOCK_SIZE, BLOCK_SIZE);
                    } else {
                        // Resilient fallback block
                        ctx.fillStyle = fallbacks[tileType];
                        ctx.fillRect(screenX, screenY, BLOCK_SIZE, BLOCK_SIZE);
                    }
                }
            }
        }
    }

    // Draw Player (Simple red square placeholder scaled perfectly to grid pixels)
    const playerScreenX = Math.floor(player.x - camera.x);
    const playerScreenY = Math.floor(player.y - camera.y);
    ctx.fillStyle = '#ff3333';
    ctx.fillRect(playerScreenX, playerScreenY, player.size, player.size);
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

// Kickstart the game loop
requestAnimationFrame(gameLoop);
</script>

</body>
</html>
