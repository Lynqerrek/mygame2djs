<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Don't Starve Style Proto - JS</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // --- CONFIGURATION ---
    const TILE_SIZE = 16;
    const WORLD_W = 100;
    const WORLD_H = 100;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // --- LOAD TEXTURES ---
    // Ground textures
    const grassTex = new Image(); grassTex.src = 'grass.png';
    const dirtTex = new Image(); dirtTex.src = 'dirt.png';
    // Cloud texture (16x16 PNG)
    const cloudTex = new Image(); cloudTex.src = 'cloud.png';

    // Track if images are actually loaded yet to prevent console errors
    let imagesLoaded = false;
    let loadedCount = 0;
    const totalImages = 3;
    function onImgLoad() {
        loadedCount++;
        if(loadedCount === totalImages) imagesLoaded = true;
    }
    grassTex.onload = onImgLoad;
    dirtTex.onload = onImgLoad;
    cloudTex.onload = onImgLoad;

    // --- TERRAIN GENERATION (Cellular Automata) ---
    let worldGrid = Array.from({ length: WORLD_W }, () => new Array(WORLD_H).fill(0));

    function generateTerrain() {
        for (let x = 0; x < WORLD_W; x++) {
            for (let y = 0; y < WORLD_H; y++) {
                worldGrid[x][y] = Math.random() < 0.4 ? 1 : 0;
            }
        }

        for (let step = 0; step < 4; step++) {
            let newGrid = worldGrid.map(arr => [...arr]);
            for (let x = 0; x < WORLD_W; x++) {
                for (let y = 0; y < WORLD_H; y++) {
                    let dirtNeighbors = 0;
                    for (let dx = -1; dx <= 1; dx++) {
                        for (let dy = -1; dy <= 1; dy++) {
                            let nx = x + dx, ny = y + dy;
                            if (nx >= 0 && nx < WORLD_W && ny >= 0 && ny < WORLD_H) {
                                dirtNeighbors += worldGrid[nx][ny];
                            } else {
                                dirtNeighbors += 1;
                            }
                        }
                    }
                    if (dirtNeighbors > 4) newGrid[x][y] = 1;
                    else if (dirtNeighbors < 4) newGrid[x][y] = 0;
                }
            }
            worldGrid = newGrid;
        }
    }
    generateTerrain();

    // --- CLOUD SYSTEM ---
    // Generates a separate high-altitude grid for clouds
    let cloudGrid = Array.from({ length: WORLD_W }, () => new Array(WORLD_H).fill(0));
    for (let x = 0; x < WORLD_W; x++) {
        for (let y = 0; y < WORLD_H; y++) {
            // Give clouds an patchy distribution (approx 15% coverage)
            cloudGrid[x][y] = Math.random() < 0.15 ? 1 : 0;
        }
    }
    // Simple offsets to make the clouds drift dynamically over time
    let cloudOffsetX = 0;
    let cloudOffsetY = 0;

    // --- GAME STATE ---
    const player = {
        x: (WORLD_W * TILE_SIZE) / 2,
        y: (WORLD_H * TILE_SIZE) / 2,
        speed: 100 
    };

    const camera = {
        x: player.x,
        y: player.y,
        zoom: 3.0 // Zoom scale: 1.0 (Zoomed Out/Clouds Visible) to 6.0 (Zoomed In)
    };

    // --- INPUT HANDLING ---
    const keys = { w: false, a: false, s: false, d: false };

    window.addEventListener('keydown', (e) => {
        if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true;
    });

    window.addEventListener('keyup', (e) => {
        if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false;
    });

    window.addEventListener('wheel', (e) => {
        camera.zoom += e.deltaY * -0.002;
        camera.zoom = Math.max(1.0, Math.min(camera.zoom, 6.0));
    });

    // --- GAME LOOP ---
    let lastTime = performance.now();

    function gameLoop(currentTime) {
        const dt = (currentTime - lastTime) / 1000;
        lastTime = currentTime;

        // 1. MOVEMENT UPDATE
        let dx = 0, dy = 0;
        if (keys.w) dy -= 1;
        if (keys.s) dy += 1;
        if (keys.a) dx -= 1;
        if (keys.d) dx += 1;

        if (dx !== 0 || dy !== 0) {
            const length = Math.sqrt(dx * dx + dy * dy);
            dx /= length;
            dy /= length;
        }

        player.x += dx * player.speed * dt;
        player.y += dy * player.speed * dt;

        // Drift the clouds slightly over time
        cloudOffsetX += 2 * dt; 
        cloudOffsetY += 1 * dt;

        // 2. CAMERA UPDATE
        camera.x += (player.x - camera.x) * 5 * dt;
        camera.y += (player.y - camera.y) * 5 * dt;

        // 3. RENDERING
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        
        ctx.translate(canvas.width / 2, canvas.height / 2);
        ctx.scale(camera.zoom, camera.zoom);
        ctx.translate(-camera.x, -camera.y);

        // Cull calculations
        const leftLimit = camera.x - (canvas.width / 2) / camera.zoom;
        const rightLimit = camera.x + (canvas.width / 2) / camera.zoom;
        const topLimit = camera.y - (canvas.height / 2) / camera.zoom;
        const bottomLimit = camera.y + (canvas.height / 2) / camera.zoom;

        const startCol = Math.max(0, Math.floor(leftLimit / TILE_SIZE));
        const endCol = Math.min(WORLD_W, Math.ceil(rightLimit / TILE_SIZE));
        const startRow = Math.max(0, Math.floor(topLimit / TILE_SIZE));
        const endRow = Math.min(WORLD_H, Math.ceil(bottomLimit / TILE_SIZE));

        // LAYER 1: Draw Map Terrain (Grass / Dirt)
        for (let x = startCol; x < endCol; x++) {
            for (let y = startRow; y < endRow; y++) {
                if (imagesLoaded) {
                    const img = worldGrid[x][y] === 1 ? dirtTex : grassTex;
                    ctx.drawImage(img, x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                } else {
                    // Fallback placeholders if images aren't found locally yet
                    ctx.fillStyle = worldGrid[x][y] === 1 ? '#785028' : '#329632';
                    ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                }
            }
        }

        // LAYER 2: Draw Player
        ctx.fillStyle = 'red';
        ctx.fillRect(player.x - 8, player.y - 24, 16, 24);

        // LAYER 3: Clouds (Appear dynamically based on Zoom level)
        // Zoom threshold configuration: Clouds start appearing at zoom 3.5, fully opaque at zoom 1.0
        const cloudStartZoom = 3.5;
        const cloudFullZoom = 1.0;

        if (camera.zoom < cloudStartZoom) {
            // Math calculation to determine opacity percentage based on current zoom
            let opacity = (cloudStartZoom - camera.zoom) / (cloudStartZoom - cloudFullZoom);
            opacity = Math.min(0.85, Math.max(0, opacity)); // Cap maximum cloud opacity at 85%

            ctx.save();
            ctx.globalAlpha = opacity;

            for (let x = startCol; x < endCol; x++) {
                for (let y = startRow; y < endRow; y++) {
                    if (cloudGrid[x][y] === 1) {
                        // Add the cloud offsets to simulate wind/movement
                        let cx = (x * TILE_SIZE) + cloudOffsetX;
                        let cy = (y * TILE_SIZE) + cloudOffsetY;

                        // Seamless wrap around if clouds drift off the edge of the map bounds
                        cx = cx % (WORLD_W * TILE_SIZE);
                        cy = cy % (WORLD_H * TILE_SIZE);

                        if (imagesLoaded) {
                            ctx.drawImage(cloudTex, cx, cy, TILE_SIZE, TILE_SIZE);
                        } else {
                            // Fallback semi-transparent white block if image missing
                            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                            ctx.fillRect(cx, cy, TILE_SIZE, TILE_SIZE);
                        }
                    }
                }
            }
            ctx.restore();
        }

        ctx.restore();

        requestAnimationFrame(gameLoop);
    }

    requestAnimationFrame(gameLoop);

</script>
</body>
</html>
